name: trip

services:
  backend:
    platform: linux/amd64
    build: ./backend
    container_name: trip-backend
    ports:
      - "8890:8000"
    env_file:
      - .env
    environment:
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/db/travel_planner.db
      - ENHANCED_DATABASE_URL=sqlite:////app/db/travel_planner_enhanced.db
    volumes:
      - backend-data:/app/db
    networks:
      - trip-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    platform: linux/amd64
    image: redis:7-alpine
    container_name: trip-redis
    networks:
      - trip-network

  frontend:
    platform: linux/amd64
    build: ./frontend
    container_name: trip-frontend
    ports:
      - "3890:3000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - REACT_APP_BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - trip-network

networks:
  trip-network:
    driver: bridge

volumes:
  backend-data:
