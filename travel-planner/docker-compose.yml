name: trip

services:
  backend:
    build: ./backend
    container_name: trip-backend
    ports:
      - "8890:8000"
    env_file:
      - .env
    volumes:
      - backend-data:/app/db
    networks:
      - trip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: trip-frontend
    ports:
      - "3890:3000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
    depends_on:
      - backend
    networks:
      - trip-network

networks:
  trip-network:
    driver: bridge

volumes:
  backend-data:
