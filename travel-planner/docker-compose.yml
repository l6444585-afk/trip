version: '3.8'

services:
  backend:
    build: ./backend
    container_name: travel-planner-backend
    ports:
      - "8000:8000"
    environment:
      - GLM_API_KEY=${GLM_API_KEY}
      - DATABASE_URL=sqlite:///./data/travel_planner.db
      - FRONTEND_URL=http://localhost:3000
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
    volumes:
      - ./backend/data:/app/data
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: travel-planner-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_AMAP_KEY=${REACT_APP_AMAP_KEY}
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  travel-network:
    driver: bridge